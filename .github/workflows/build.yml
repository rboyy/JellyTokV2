name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: JellyTok-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Read version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: version
        run: |
          VERSION_NAME=$(grep 'versionName' version.properties | cut -d'=' -f2 || echo "1.0")
          BUILD_COUNT=$(grep 'build.count' version.properties | cut -d'=' -f2 || echo "0")
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "build_count=${BUILD_COUNT}" >> $GITHUB_OUTPUT

      - name: Rename APK
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk app/build/outputs/apk/debug/JellyTok-v${{ steps.version.outputs.version_name }}-debug.apk

      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version_name }}
          name: JellyTok v${{ steps.version.outputs.version_name }}
          body: |
            Auto build #${{ steps.version.outputs.build_count }}
            Commit: ${{ github.sha }}
          files: |
            app/build/outputs/apk/debug/JellyTok-v${{ steps.version.outputs.version_name }}-debug.apk
          prerelease: true
